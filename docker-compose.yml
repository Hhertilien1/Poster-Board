version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: posterboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5001:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/posterboard
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -c 'from app import create_app, db; app = create_app(); 
      with app.app_context(): db.create_all()' && 
      gunicorn --bind 0.0.0.0:8080 wsgi:app"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5001
    depends_on:
      - backend

volumes:
  pgdata: